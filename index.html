<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sample Brand アンケートLP 追従CTA 叩き台</title>
<style>
  /* ===== デモ用：LP本体のダミー ===== */
  :root{
    --sample-brand:#b08968;      /* Sample Brandブランド近似カラー（仮） */
    --sample-brand-dark:#8a6748; /* hover/active */
    --sample-text:#ffffff;
    --cta-height:76px;
    --cta-radius:999px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Hiragino Sans","Noto Sans JP",sans-serif;color:#333;line-height:1.7;}
  .demo-fv{min-height:60vh;background:linear-gradient(180deg,#f5efe6,#e9dfd0);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;padding:40px 20px;text-align:center;}
  .demo-section{padding:40px 20px;max-width:480px;margin:0 auto;}
  .demo-section h2{font-size:18px;margin:0 0 16px;}
  .demo-section p{margin:0 0 24px;font-size:14px;}
  .demo-spacer{height:120vh;background:repeating-linear-gradient(180deg,#fafafa 0 80px,#f0ebe3 80px 160px);display:flex;align-items:center;justify-content:center;color:#999;font-size:13px;}

  /* ===== 追従CTA本体（右端・上下中央 縦型） ===== */
  .sticky-cta{
    position: fixed;
    right: 0;
    top: 50%;
    z-index: 9999;
    transform: translate(120%, -50%);
    transition: transform .35s cubic-bezier(.22,.61,.36,1);
    pointer-events: none;
  }
  .sticky-cta.is-visible{
    transform: translate(0, -50%);
    pointer-events: auto;
  }

  .sticky-cta__inner{
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .sticky-cta__btn{
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 56px;
    min-height: 210px;
    padding: 16px 6px;
    background: var(--sample-brand);
    color: var(--sample-text);
    font-weight: bold;
    letter-spacing: .1em;
    text-decoration: none;
    border: none;
    border-radius: 14px 0 0 14px;
    box-shadow: -4px 4px 14px rgba(0,0,0,0.18);
    cursor: pointer;
    writing-mode: vertical-rl;
    text-orientation: upright;
    transition: transform .12s ease, background .12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .sticky-cta__btn:active{
    transform: translateX(2px);
    background: var(--sample-brand-dark);
  }

  .sticky-cta__btn-sub{
    display: block;
    font-size: 11px;
    letter-spacing: .06em;
    opacity: 0.9;
    margin-right: 2px;
  }

  .sticky-cta__btn-label{
    display: block;
    font-size: 16px;
    letter-spacing: .14em;
  }

  /* 2つ目：サブCTA（もっと詳しく知りたい方はこちら） */
  .sticky-cta__btn--secondary{
    background: #ffffff;
    color: var(--sample-brand-dark);
    border: 1.5px solid var(--sample-brand);
    min-height: 195px;
    padding: 14px 4px;
    letter-spacing: .06em;
    box-shadow: -3px 3px 10px rgba(0,0,0,0.12);
  }
  .sticky-cta__btn--secondary:active{
    background: #f7efe6;
  }
  .sticky-cta__btn--secondary .sticky-cta__btn-label{
    font-size: 13px;
    letter-spacing: .06em;
    line-height: 1.4;
  }

  /* スマホでは少しコンパクトに */
  @media (max-width: 480px){
    .sticky-cta__btn{
      width: 50px;
      min-height: 185px;
      padding: 14px 4px;
    }
    .sticky-cta__btn-sub{ font-size: 10px; margin-right: 2px; }
    .sticky-cta__btn-label{ font-size: 15px; }
  }
</style>
</head>
<body>

  <!-- ===== デモ用ダミーコンテンツ（本番では削除） ===== -->
  <section class="demo-fv">
    FV：アンケートLPヘッダー想定<br>
    <span style="font-size:13px;font-weight:normal;">↓ スクロールしても下の「購入はこちら」が画面に追従します</span>
  </section>
  <section class="demo-section">
    <h2>Q1. 普段のメイクの悩みは？</h2>
    <p>（アンケートLP本体のダミー）</p>
    <h2>Q2. ファンデーション選びで重視するポイントは？</h2>
    <p>下部の追従CTAは画面最下部に常時固定されます。</p>
    <h2>Q3. ベースメイクの使用順序は？</h2>
    <p>……</p>
    <h2>Q4. パウダーの質感の好み</h2>
    <p>……</p>
  </section>
  <section class="demo-spacer">↓ スクロールしてもCTAが追従していることを確認 ↓</section>
  <section class="demo-section">
    <h2>Q5. さらに質問</h2>
    <p>まだ追従しているはずです。</p>
    <h2>Q6. 最後の質問</h2>
    <p>ページ末尾でもCTAは画面下に残ります。</p>
  </section>

  <!-- ===== 追従CTA（右端中央・縦型） ===== -->
  <div class="sticky-cta is-visible" id="stickyCta" role="complementary" aria-label="購入への導線">
    <div class="sticky-cta__inner">
      <a
        href="https://sample.com/?utm_source=survey-lp&utm_medium=sticky-cta&utm_campaign=perfect-kit"
        class="sticky-cta__btn"
        id="stickyCtaBtn"
        data-gtm="sticky-cta-purchase"
      >
        <span class="sticky-cta__btn-sub">サンプルキット</span>
        <span class="sticky-cta__btn-label">購入はこちら</span>
      </a>
      <a
        href="https://sample.com/?utm_source=survey-lp&utm_medium=sticky-cta&utm_campaign=detail"
        class="sticky-cta__btn sticky-cta__btn--secondary"
        id="stickyCtaBtn2"
        data-gtm="sticky-cta-detail"
      >
        <span class="sticky-cta__btn-label">もっと詳しく知りたい方はこちら</span>
      </a>
    </div>
  </div>

<script>
(function(){
  var cta = document.getElementById('stickyCta');
  var btn = document.getElementById('stickyCtaBtn');
  if(!cta) return;

  // 初期表示モード：ページ読み込み直後から常時画面下に追従
  // （スクロール閾値出現に切り替えたい場合は MODE を 'scroll' に）
  var MODE = 'always';      // 'always' | 'scroll'
  var SHOW_AT = 200;
  var dismissed = sessionStorage.getItem('sample_sticky_cta_dismissed') === '1';

  if(dismissed){
    cta.classList.remove('is-visible');
  } else if(MODE === 'always'){
    cta.classList.add('is-visible');
    if(window.dataLayer){
      window.dataLayer.push({event:'sticky_cta_impression'});
    }
  } else {
    cta.classList.remove('is-visible');
    var shown = false;
    window.addEventListener('scroll', function(){
      if(!shown && window.scrollY > SHOW_AT){
        cta.classList.add('is-visible');
        shown = true;
        if(window.dataLayer){
          window.dataLayer.push({event:'sticky_cta_impression'});
        }
      }
    }, {passive:true});
  }

  // クリック計測（1つ目：購入）
  btn.addEventListener('click', function(){
    if(window.dataLayer){
      window.dataLayer.push({event:'sticky_cta_click'});
    }
  });

  // クリック計測（2つ目：詳細）
  var btn2 = document.getElementById('stickyCtaBtn2');
  if(btn2){
    btn2.addEventListener('click', function(){
      if(window.dataLayer){
        window.dataLayer.push({event:'sticky_cta_detail_click'});
      }
    });
  }
})();
</script>

</body>
</html>
